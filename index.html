<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ihouse小分队之夏威夷 🌺</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600&display=swap');

  :root{
    --ocean-deep:#0B3D4E;
    --ocean:#0E5E77;
    --lava:#D94B2B;
    --plumeria:#F5B942;
    --sand:#F6EFE1;
    --ink:#1B2A2E;
    --palm:#2F6B4F;
    --line:rgba(27,42,46,0.12);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--sand);
    color:var(--ink);
    font-family:'Space Grotesk', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    background: linear-gradient(160deg, var(--ocean-deep) 0%, var(--ocean) 55%, #147a8f 100%);
    color:var(--sand);
    padding: 56px 32px 72px;
    overflow:hidden;
  }
  .hero::after{
    content:"";
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 85% 20%, rgba(245,185,66,0.35), transparent 40%),
      radial-gradient(circle at 10% 90%, rgba(217,75,43,0.25), transparent 45%);
    pointer-events:none;
  }
  .hero-inner{ position:relative; max-width:1080px; margin:0 auto; }
  .eyebrow{
    font-size:13px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--plumeria); font-weight:600; margin-bottom:14px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size: clamp(34px, 6vw, 64px);
    line-height:1.03;
    margin:0 0 18px;
    letter-spacing:-0.01em;
  }
  .hero p.sub{
    max-width:560px; font-size:16px; line-height:1.6; color:rgba(246,239,225,0.85); margin:0;
  }
  .hero-stats{
    display:flex; gap:28px; margin-top:36px; flex-wrap:wrap;
  }
  .stat{ }
  .stat .n{ font-family:'Fraunces', serif; font-size:28px; font-weight:600; color:var(--sand); }
  .stat .l{ font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:rgba(246,239,225,0.65); }

  /* ---------- LAYOUT ---------- */
  .wrap{ max-width:1080px; margin: -40px auto 0; padding: 0 24px 80px; position:relative; }

  .panel{
    background:#fff;
    border-radius:20px;
    box-shadow: 0 20px 60px rgba(11,61,78,0.18);
    overflow:hidden;
    border:1px solid var(--line);
  }

  /* day tabs */
  .tabs{
    display:flex; overflow-x:auto; gap:4px; padding:14px 14px 0;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;
    padding:10px 16px;
    border-radius:10px 10px 0 0;
    font-size:13px; font-weight:600;
    cursor:pointer;
    color:rgba(27,42,46,0.5);
    border:1px solid transparent;
    white-space:nowrap;
    transition: color .15s ease;
  }
  .tab .d{ font-family:'Fraunces', serif; font-weight:700; margin-right:6px; }
  .tab.active{
    color:var(--ink);
    background:var(--sand);
    border-color:var(--line);
    border-bottom-color:var(--sand);
  }

  .content{
    display:grid;
    grid-template-columns: 1.1fr 1fr;
    background:var(--sand);
  }
  @media (max-width: 820px){
    .content{ grid-template-columns:1fr; }
  }

  #map{ width:100%; height: 560px; }
  @media (max-width: 820px){ #map{ height:360px; } }

  .day-info{
    padding: 28px 28px 32px;
  }
  .day-title{
    font-family:'Fraunces', serif;
    font-size:24px; font-weight:700; margin:0 0 4px;
  }
  .day-sub{
    font-size:13px; color:rgba(27,42,46,0.55); margin:0 0 20px;
  }
  .stop{
    display:grid;
    grid-template-columns: 28px 1fr;
    gap:12px;
    padding: 14px 0;
    border-top:1px solid var(--line);
  }
  .stop:first-of-type{ border-top:none; }
  .stop .dot{
    width:28px; height:28px; border-radius:50%;
    background:var(--ocean);
    color:#fff; font-size:12px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk', sans-serif;
  }
  .stop .body .time{
    font-size:12px; font-weight:600; color:var(--lava);
    text-transform:uppercase; letter-spacing:.04em;
  }
  .stop .body .name{ font-size:15px; font-weight:600; margin:2px 0 3px; }
  .stop .body .note{ font-size:13px; color:rgba(27,42,46,0.65); line-height:1.5; }
  .warn{
    display:inline-block; margin-top:4px; font-size:11px; font-weight:600;
    color:var(--lava); background:rgba(217,75,43,0.1);
    padding:2px 8px; border-radius:20px;
  }

  footer{
    max-width:1080px; margin: 24px auto 0; padding: 0 24px;
    font-size:12px; color:rgba(27,42,46,0.45); text-align:center;
  }

  .leaflet-popup-content{ font-family:'Space Grotesk', sans-serif; font-size:13px; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="eyebrow">ihouse小分队 · Trip Plan</div>
    <h1>夏威夷<br>Oʻahu &amp; Big Island</h1>
    <p class="sub">从Waikiki出发环游欧胡岛东海岸，飞往大岛探索火山、黑沙滩、Mauna Kea云海星空与Kona北岸 —— 8天全览路线图。</p>
    <div class="hero-stats">
      <div class="stat"><div class="n">8</div><div class="l">Days</div></div>
      <div class="stat"><div class="n">2</div><div class="l">Islands</div></div>
      <div class="stat"><div class="n">40</div><div class="l">Stops</div></div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="panel">
    <div class="tabs" id="tabs"></div>
    <div class="content">
      <div id="map"></div>
      <div class="day-info">
        <div class="day-title" id="dayTitle"></div>
        <div class="day-sub" id="daySub"></div>
        <div id="stopsList"></div>
      </div>
    </div>
  </div>
</div>

<footer>ihouse小分队之夏威夷 8天路线 🏝️🌺 &nbsp;·&nbsp; 地图数据 © OpenStreetMap contributors</footer>

let map, markersLayer, routeLayer;
let activeDay = 0;

function initMap(){
  map = L.map('map', {
    zoomControl:true,
    scrollWheelZoom:true,
    doubleClickZoom:true,
    touchZoom:true,
    boxZoom:true,
    minZoom:2,
    maxZoom:18
  }).setView([20.8,-156.8], 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: ''
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
  routeLayer = L.layerGroup().addTo(map);
  renderTabs();
  renderDay(0);

  // Ensure map recalculates its size correctly (fixes zoom controls not working
  // when the map is initialized inside a container that wasn't fully laid out yet)
  setTimeout(()=> map.invalidateSize(), 200);
  window.addEventListener('resize', ()=> map.invalidateSize());
}

function renderTabs(){
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  DAYS.forEach((d,i)=>{
    const t = document.createElement('div');
    t.className = 'tab' + (i===activeDay ? ' active':'');
    const tabText = d.title.split('·').slice(2).join('·').trim() || d.title;
    t.innerHTML = `<span class="d">D${i+1}</span>${d.date} · ${tabText}`;
    t.onclick = ()=>{ activeDay = i; renderTabs(); renderDay(i); };
    tabsEl.appendChild(t);
  });
}

function renderDay(i){
  const day = DAYS[i];
  document.getElementById('dayTitle').textContent = day.title;
  document.getElementById('daySub').textContent = day.sub;

  markersLayer.clearLayers();
  routeLayer.clearLayers();

  const bounds = [];
  const latlngs = [];

  day.stops.forEach((s, idx)=>{
    const icon = L.divIcon({
      className: '',
      html: `<div style="background:${day.color};color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;box-shadow:0 2px 6px rgba(0,0,0,0.3);border:2px solid #fff;">${idx+1}</div>`,
      iconSize:[26,26],
      iconAnchor:[13,13]
    });
    const m = L.marker([s.lat, s.lng], {icon}).addTo(markersLayer);
    const gmapsUrl = `https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}`;
    m.bindPopup(`
      <div style="min-width:180px">
        <b>${s.name}</b><br>
        <span style="color:#D94B2B;font-weight:600;">${s.time}</span><br>
        <span>${s.note}</span><br>
        ${s.warn ? `<span style="color:#D94B2B;">⚠️ ${s.warn}</span><br>` : ''}
        <a href="${gmapsUrl}" target="_blank" rel="noopener"
           style="display:inline-block;margin-top:6px;color:#0E5E77;font-weight:600;text-decoration:underline;">
           在 Google Maps 中查看 ↗
        </a>
      </div>
    `);
    s._marker = m;
    bounds.push([s.lat, s.lng]);
    latlngs.push([s.lat, s.lng]);
  });

  if(latlngs.length > 1){
    L.polyline(latlngs, { color: day.color, weight:3, opacity:0.6, dashArray:'6 8' }).addTo(routeLayer);
  }
  if(bounds.length){
    map.fitBounds(bounds, { padding:[40,40], maxZoom:12 });
  }

  const list = document.getElementById('stopsList');
  list.innerHTML = '';
  day.stops.forEach((s, idx)=>{
    const el = document.createElement('div');
    el.className = 'stop';
    el.style.cursor = 'pointer';
    el.innerHTML = `
      <div class="dot" style="background:${day.color}">${idx+1}</div>
      <div class="body">
        <div class="time">${s.time}</div>
        <div class="name">${s.name}</div>
        <div class="note">${s.note}</div>
        ${s.warn ? `<div class="warn">⚠️ ${s.warn}</div>` : ''}
      </div>
    `;
    el.addEventListener('click', ()=>{
      if(s._marker){
        map.setView([s.lat, s.lng], 14);
        s._marker.openPopup();
      }
    });
    list.appendChild(el);
  });
}

initMap();
</script>

</body>
</html>
